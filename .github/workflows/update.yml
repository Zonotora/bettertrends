name: Daily update

on:
  schedule:
    # 02:00 UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── run full pipeline ────────────────────────────────────────────────
      - name: Run pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python update.py run-all

      # ── 5. commit db + html back to main ────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_trending.db index.html
          git diff --cached --quiet || git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push

  # ── deploy index.html to GitHub Pages ───────────────────────────────────
  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # pick up the commit from the update job

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # serve the whole repo root; index.html is the entry point

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
